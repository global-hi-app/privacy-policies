<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>微笑科技｜政策與條款</title>
  <meta name="description" content="微笑科技旗下各應用程式與網站之政策與條款索引頁。" />
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 72px;
    }
    .hero {
      margin-bottom: 28px;
    }
    h1 {
      font-size: 32px;
      margin: 0 0 12px;
      line-height: 1.25;
    }
    .sub {
      color: var(--muted);
      margin: 0;
      font-size: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }
    .list {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }
    .item {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      background: #fff;
    }
    .item:hover {
      transform: translateY(-1px);
      border-color: #cbd5e1;
      box-shadow: 0 8px 22px rgba(0,0,0,.05);
    }
    .item-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .item-desc {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }
    .footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 14px;
    }
    code {
      background: #eef2ff;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>微笑科技｜政策與條款</h1>
      <p class="sub">本頁提供微笑科技旗下網站、App 與相關服務之隱私權政策與條款索引。你可以在同一個 GitHub Pages repo 內，持續新增不同應用程式的獨立頁面。</p>
    </section>

    <section class="card">
      <h2 style="margin-top:0; font-size:22px;">已上線頁面</h2>
      <div class="list">
        <a class="item" href="./haiglobals-app/">
          <div class="item-title">haiglobals-app｜隱私權保護政策</div>
          <p class="item-desc">提供給全球嗨 App / Google Play Console 使用的公開政策頁面。</p>
        </a>
      </div>
      <p class="footer">未來若要新增其他 App，可延用相同結構，例如 <code>/another-app/</code>、<code>/osmileshop-app/</code>、<code>/health-app/</code>。</p>
    </section>
  </main>
</body>
</html>
